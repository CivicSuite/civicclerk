name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install CivicCore release-provenance helper
        run: python -m pip install "git+https://github.com/CivicSuite/civiccore.git@main"
      - name: Verify release provenance before building artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          target_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          expected_tree="$(git show -s --format=%T "$target_commit")"
          python scripts/verify-release-provenance.py "$GITHUB_REF_NAME" \
            --repo "${{ github.repository }}" \
            --expected-target "$target_commit" \
            --expected-tree "$expected_tree"
      - name: Install CivicCore release wheel
        run: python -m pip install https://github.com/CivicSuite/civiccore/releases/download/v0.22.0/civiccore-0.22.0-py3-none-any.whl
      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Verify release
        run: bash scripts/verify-release.sh
      - name: Upload release build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: civicclerk-release-dist
          path: dist/*
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "CivicClerk $GITHUB_REF_NAME" \
            --notes "CivicClerk $GITHUB_REF_NAME runtime foundation release. Built by the release workflow after verify-release.sh passed." \
            --verify-tag
