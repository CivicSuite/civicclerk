name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Published release tag to rehearse from cold caches"
        required: true
        default: "v1.0.3"

permissions:
  contents: write
  id-token: write

jobs:
  cleanroom-rehearsal:
    name: cleanroom-rehearsal
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: scott-desktop-cleanroom-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python for direct-pip cleanroom
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node for frontend cleanroom
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Cleanroom cache strip (scoped, CivicSuite-only)
        shell: bash
        run: |
          python - <<'PY'
          import os
          import shutil

          runner_temp = os.environ["RUNNER_TEMP"]
          for rel in (".npm", ".cache/pip"):
              shutil.rmtree(os.path.join(runner_temp, rel), ignore_errors=True)
          PY
          docker builder prune --all --force --filter "label=civicsuite-cleanroom=1" || true
          docker network ls --filter "label=civicsuite-cleanroom=1" -q \
            | xargs -r docker network rm || true
          docker volume ls --filter "label=civicsuite-cleanroom=1" -q \
            | xargs -r docker volume rm || true

      - name: Install published wheel from release URL
        shell: bash
        run: |
          TAG="${{ inputs.release_tag }}"
          VERSION="${TAG#v}"
          WHEEL_URL="https://github.com/CivicSuite/civicclerk/releases/download/${TAG}/civicclerk-${VERSION}-py3-none-any.whl"
          echo "Cleanroom wheel URL: ${WHEEL_URL}"
          python -m venv .cleanroom-venv
          . .cleanroom-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir --force-reinstall "${WHEEL_URL}"
          TESTING=1 python - <<PY
          import civicclerk
          from civiccore.ingest import CitedSentence, SourceMaterial, validate_cited_sentences

          expected = "${VERSION}"
          print(f"civicclerk.__version__={civicclerk.__version__}")
          if civicclerk.__version__ != expected:
              raise SystemExit(f"Expected CivicClerk {expected}, got {civicclerk.__version__}")
          print(
              "civiccore dependency import ok: "
              f"{CitedSentence.__name__}, {SourceMaterial.__name__}, {validate_cited_sentences.__name__}"
          )
          PY

      - name: Frontend clean install and build
        shell: bash
        working-directory: frontend
        run: |
          python - <<'PY'
          import shutil
          shutil.rmtree("node_modules", ignore_errors=True)
          PY
          npm ci --prefer-online --no-cache --no-audit --no-fund \
            --cache "${RUNNER_TEMP}/.npm"
          npm run build

      - name: Always-run cleanup
        if: always()
        shell: bash
        run: |
          docker compose -p civicsuite-cleanroom-${{ github.run_id }} down -v --remove-orphans || true
          docker ps -a --filter "label=civicsuite-cleanroom=1" -q \
            | xargs -r docker container rm --force || true
          docker network ls --filter "label=civicsuite-cleanroom=1" -q \
            | xargs -r docker network rm || true

  preflight:
    name: Preflight release provenance fixtures
    if: github.event_name == 'push'
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: civicclerk-release-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          clean: false
          path: civicclerk-release-${{ github.run_id }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install CivicCore freeze release-provenance helper
        run: python -m pip install https://github.com/CivicSuite/civiccore/releases/download/v1.2.0/civiccore-1.2.0-py3-none-any.whl
      - name: Checkout canonical CivicCore freeze provenance fixtures
        uses: actions/checkout@v6
        with:
          repository: CivicSuite/civiccore
          ref: v1.2.0
          path: civicclerk-release-${{ github.run_id }}/.tmp-civiccore
      - name: Verify adversarial release provenance fixtures
        run: python scripts/verify-release-provenance.py --fixtures-dir .tmp-civiccore/tests/fixtures/release_provenance

  verify-build:
    if: github.event_name == 'push'
    runs-on: [self-hosted, linux, x64]
    needs: preflight
    defaults:
      run:
        working-directory: civicclerk-release-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          clean: false
          path: civicclerk-release-${{ github.run_id }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install CivicCore freeze release wheel
        run: python -m pip install https://github.com/CivicSuite/civiccore/releases/download/v1.2.0/civiccore-1.2.0-py3-none-any.whl
      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Verify release
        run: bash scripts/verify-release.sh
      - name: Build release handoff bundle
        run: bash scripts/build_release_handoff_bundle.sh
      - name: Install CivicCore freeze release-provenance helper
        run: python -m pip install --force-reinstall https://github.com/CivicSuite/civiccore/releases/download/v1.2.0/civiccore-1.2.0-py3-none-any.whl
      - name: Resolve release ref
        id: release_ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ref_json="$(gh api "repos/${{ github.repository }}/git/ref/tags/${GITHUB_REF_NAME}")"
          tag_ref_type="$(echo "$ref_json" | python -c "import json,sys; print(json.load(sys.stdin)['object']['type'])")"
          tag_ref_sha="$(echo "$ref_json" | python -c "import json,sys; print(json.load(sys.stdin)['object']['sha'])")"
          if [ "$tag_ref_type" = "tag" ]; then
            tag_json="$(gh api "repos/${{ github.repository }}/git/tags/${tag_ref_sha}")"
            target_commit="$(echo "$tag_json" | python -c "import json,sys; print(json.load(sys.stdin)['object']['sha'])")"
          else
            target_commit="$tag_ref_sha"
          fi
          target_tree="$(git show -s --format=%T "$target_commit")"
          echo "tag_ref_type=$tag_ref_type" >> "$GITHUB_OUTPUT"
          echo "tag_ref_sha=$tag_ref_sha" >> "$GITHUB_OUTPUT"
          echo "target_commit=$target_commit" >> "$GITHUB_OUTPUT"
          echo "target_tree=$target_tree" >> "$GITHUB_OUTPUT"
      - name: Build release attestation
        run: |
          python scripts/build-release-attestation.py \
            --repo "${{ github.repository }}" \
            --tag "${GITHUB_REF_NAME}" \
            --tag-ref-type "${{ steps.release_ref.outputs.tag_ref_type }}" \
            --tag-ref-sha "${{ steps.release_ref.outputs.tag_ref_sha }}" \
            --target-commit "${{ steps.release_ref.outputs.target_commit }}" \
            --target-tree "${{ steps.release_ref.outputs.target_tree }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --artifacts-dir dist \
            --output release-attestation.json
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.1
      - name: Sign release attestation
        run: cosign sign-blob release-attestation.json --bundle release-attestation.json.bundle --yes
      - name: Verify release attestation before publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/verify-release-provenance.py "${GITHUB_REF_NAME}" \
            --repo "${{ github.repository }}" \
            --attestation release-attestation.json \
            --bundle release-attestation.json.bundle \
            --artifacts-dir dist \
            --expected-target "${{ steps.release_ref.outputs.target_commit }}" \
            --expected-tree "${{ steps.release_ref.outputs.target_tree }}"
      - name: Upload release build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: civicclerk-release-dist
          path: |
            civicclerk-release-${{ github.run_id }}/dist/*
            civicclerk-release-${{ github.run_id }}/release-attestation.json
            civicclerk-release-${{ github.run_id }}/release-attestation.json.bundle

  create-draft-release:
    name: Create draft GitHub Release
    if: github.event_name == 'push'
    needs: [verify-build]
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: civicclerk-release-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          clean: false
          path: civicclerk-release-${{ github.run_id }}

      - uses: actions/download-artifact@v8
        with:
          name: civicclerk-release-dist
          path: civicclerk-release-${{ github.run_id }}/release-assets

      - name: Write release notes with exact provenance command
        shell: bash
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          export REPO="${GITHUB_REPOSITORY}"
          export TAG="${GITHUB_REF_NAME}"
          export WORKFLOW_RUN_ID="${GITHUB_RUN_ID}"
          export WHEEL_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/civicclerk-${VERSION}-py3-none-any.whl"
          export CLEANROOM_TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > release-notes.md <<NOTES
          CivicClerk ${TAG} runtime foundation release. Built by the release workflow after verify-release.sh passed.

          Cleanroom rehearsal: PASSED in workflow run ${WORKFLOW_RUN_ID}.
          Verified clean install of ${WHEEL_URL} from cold caches at ${CLEANROOM_TIMESTAMP}.

          Release provenance:
          - The Git tag is a release pointer; the trust artifact is release-attestation.json plus release-attestation.json.bundle.
          - Pre-flight provenance fixtures and live attestation verification ran before publication in workflow run ${WORKFLOW_RUN_ID}.
          - Verify with:

          \`\`\`bash
          cosign verify-blob release-attestation.json \\
            --bundle release-attestation.json.bundle \\
            --certificate-identity "https://github.com/${REPO}/.github/workflows/release.yml@refs/tags/${TAG}" \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

          sha256sum -c SHA256SUMS.txt
          python scripts/verify-release-provenance.py "${TAG}" \\
            --repo "${REPO}" \\
            --attestation release-attestation.json \\
            --bundle release-attestation.json.bundle \\
            --artifacts-dir .
          \`\`\`
          NOTES

      - name: Create draft release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --title "CivicClerk $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
          gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber

  release-cleanroom-rehearsal:
    name: cleanroom-rehearsal (release asset)
    if: github.event_name == 'push'
    needs: [create-draft-release]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: scott-desktop-cleanroom-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python for release-asset cleanroom
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node for frontend cleanroom
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Cleanroom cache strip (scoped, CivicSuite-only)
        shell: bash
        run: |
          python - <<'PY'
          import os
          import shutil

          runner_temp = os.environ["RUNNER_TEMP"]
          for rel in (".npm", ".cache/pip"):
              shutil.rmtree(os.path.join(runner_temp, rel), ignore_errors=True)
          PY
          docker builder prune --all --force --filter "label=civicsuite-cleanroom=1" || true
          docker network ls --filter "label=civicsuite-cleanroom=1" -q \
            | xargs -r docker network rm || true
          docker volume ls --filter "label=civicsuite-cleanroom=1" -q \
            | xargs -r docker volume rm || true

      - name: Download uploaded wheel from draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p .cleanroom-assets
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern 'civicclerk-*-py3-none-any.whl' \
            --dir .cleanroom-assets
          find .cleanroom-assets -maxdepth 1 -type f -print

      - name: Install uploaded wheel in cleanroom venv
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          WHEEL="$(find .cleanroom-assets -name 'civicclerk-*-py3-none-any.whl' -type f | head -1)"
          if [ -z "$WHEEL" ]; then
            echo "::error::No CivicClerk wheel downloaded from draft release."
            exit 1
          fi
          echo "Cleanroom wheel asset: ${WHEEL}"
          python -m venv .cleanroom-venv
          . .cleanroom-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir --force-reinstall "${WHEEL}"
          TESTING=1 python - <<PY
          import civicclerk
          from civiccore.ingest import CitedSentence, SourceMaterial, validate_cited_sentences

          expected = "${VERSION}"
          print(f"civicclerk.__version__={civicclerk.__version__}")
          if civicclerk.__version__ != expected:
              raise SystemExit(f"Expected CivicClerk {expected}, got {civicclerk.__version__}")
          print(
              "civiccore dependency import ok: "
              f"{CitedSentence.__name__}, {SourceMaterial.__name__}, {validate_cited_sentences.__name__}"
          )
          PY

      - name: Frontend clean install and build
        shell: bash
        working-directory: frontend
        run: |
          python - <<'PY'
          import shutil
          shutil.rmtree("node_modules", ignore_errors=True)
          PY
          npm ci --prefer-online --no-cache --no-audit --no-fund \
            --cache "${RUNNER_TEMP}/.npm"
          npm run build

      - name: Always-run cleanup
        if: always()
        shell: bash
        run: |
          docker compose -p civicsuite-cleanroom-${{ github.run_id }} down -v --remove-orphans || true
          docker ps -a --filter "label=civicsuite-cleanroom=1" -q \
            | xargs -r docker container rm --force || true
          docker network ls --filter "label=civicsuite-cleanroom=1" -q \
            | xargs -r docker network rm || true

  publish-release:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: [release-cleanroom-rehearsal]
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Publish release after cleanroom rehearsal
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
