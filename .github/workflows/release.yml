name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CivicCore release wheel
        run: python -m pip install https://github.com/CivicSuite/civiccore/releases/download/v0.2.0/civiccore-0.2.0-py3-none-any.whl
      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Verify release
        run: bash scripts/verify-release.sh
      - name: Upload release build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: civicclerk-release-dist
          path: dist/*
