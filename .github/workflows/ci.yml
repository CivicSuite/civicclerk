name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "civicclerk/**"
      - "frontend/**"
      - "scripts/**"
      - "tests/**"
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - "USER-MANUAL.md"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: civicclerk-checkout-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v5
        with:
          clean: false
          path: civicclerk-checkout-${{ github.run_id }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: "civicclerk-checkout-${{ github.run_id }}/frontend/package-lock.json"
      - name: Install CivicCore freeze release wheel
        run: python -m pip install https://github.com/CivicSuite/civiccore/releases/download/v1.2.0/civiccore-1.2.0-py3-none-any.whl
      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Install frontend dependencies
        run: npm ci
        working-directory: civicclerk-checkout-${{ github.run_id }}/frontend
      - name: Audit frontend dependencies
        run: |
          for attempt in 1 2 3; do
            if npm audit --audit-level=moderate --registry=https://registry.npmjs.org --prefer-online; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "npm audit failed on attempt ${attempt}; retrying after registry backoff..."
              sleep 20
            fi
          done
          echo "::error::npm audit failed after 3 attempts. Treat this as a real dependency-audit gate failure or registry outage needing operator review."
          exit 1
        working-directory: civicclerk-checkout-${{ github.run_id }}/frontend
      - name: Build frontend
        run: npm run build
        working-directory: civicclerk-checkout-${{ github.run_id }}/frontend
      - name: Test frontend
        run: npm test
        working-directory: civicclerk-checkout-${{ github.run_id }}/frontend
      - name: Collect pytest count
        run: |
          set -o pipefail
          python -m pytest --collect-only -q 2>&1 | tee pytest-collect.log
      - name: Run tests
        run: |
          set -o pipefail
          python -m pytest 2>&1 | tee pytest-run.log
      - name: Verify collected == passed or reported skips
        run: |
          python - <<'PY'
          from __future__ import annotations

          import re
          import sys
          from pathlib import Path

          collect_log = Path("pytest-collect.log").read_text(encoding="utf-8", errors="replace")
          run_log = Path("pytest-run.log").read_text(encoding="utf-8", errors="replace")

          collected_matches = re.findall(r"(\d+)\s+tests?\s+collected", collect_log)
          if not collected_matches:
              print("::error::Could not parse pytest collection count from pytest-collect.log.")
              sys.exit(1)
          collected = int(collected_matches[-1])

          summary_matches = re.findall(
              r"=+\s*([^=\n]*\b(?:passed|failed|error|skipped|xfailed|xpassed|deselected)\b[^=\n]*)\s*=+",
              run_log,
          )
          if not summary_matches:
              print("::error::Could not parse pytest result summary from pytest-run.log.")
              sys.exit(1)
          summary = summary_matches[-1]

          def count(label: str) -> int:
              match = re.search(rf"(\d+)\s+{label}", summary)
              return int(match.group(1)) if match else 0

          passed = count("passed")
          skipped = count("skipped")
          deselected = count("deselected")
          failed = count("failed")
          errors = count("errors?")
          xfailed = count("xfailed")
          xpassed = count("xpassed")
          accounted = passed + skipped + deselected

          print(f"collected={collected}")
          print(f"passed={passed}")
          print(f"skipped={skipped}")
          print(f"deselected={deselected}")
          if failed or errors or xfailed or xpassed:
              print(
                  f"::error::Unexpected pytest non-pass outcomes: failed={failed} "
                  f"errors={errors} xfailed={xfailed} xpassed={xpassed}."
              )
              sys.exit(1)
          if collected != accounted:
              print(
                  f"::error::Collection/run mismatch: collected={collected} "
                  f"accounted={accounted} passed={passed} skipped={skipped} deselected={deselected}."
              )
              print("::error::Investigate silent test loss, early exit, or unreported pytest outcomes.")
              sys.exit(1)
          if collected != passed:
              print(
                  f"::notice::Collected count differs from passed only by reported skips/deselections "
                  f"(skipped={skipped}, deselected={deselected})."
              )
          PY
      - name: Verify docs baseline
        run: bash scripts/verify-docs.sh
      - name: Verify recovery gates
        run: python scripts/verify-recovery-gates.py
      - name: Run secret scan
        run: python scripts/verify-secret-scan.py
      - name: Check CivicCore placeholder imports
        run: python scripts/check-civiccore-placeholder-imports.py
      - name: Verify browser QA evidence
        run: python scripts/verify-browser-qa.py
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: civicclerk-checkout-${{ github.run_id }}/frontend
      - name: Run Playwright user flows
        run: npm run test:e2e
        working-directory: civicclerk-checkout-${{ github.run_id }}/frontend
      - name: Run prompt eval harness
        env:
          CIVICCORE_LLM_PROVIDER: ollama
          CIVICCLERK_EVAL_OFFLINE: "1"
          NO_NETWORK: "1"
        run: python scripts/run-prompt-evals.py
