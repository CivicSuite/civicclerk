name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install CivicCore release wheel
        run: python -m pip install https://github.com/CivicSuite/civiccore/releases/download/v0.3.0/civiccore-0.3.0-py3-none-any.whl
      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest
      - name: Verify docs baseline
        run: bash scripts/verify-docs.sh
      - name: Check CivicCore placeholder imports
        run: python scripts/check-civiccore-placeholder-imports.py
      - name: Verify browser QA evidence
        run: python scripts/verify-browser-qa.py
      - name: Run prompt eval harness
        env:
          CIVICCORE_LLM_PROVIDER: ollama
          CIVICCLERK_EVAL_OFFLINE: "1"
          NO_NETWORK: "1"
        run: python scripts/run-prompt-evals.py
