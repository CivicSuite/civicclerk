name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install CivicCore release wheel
        run: python -m pip install https://github.com/CivicSuite/civiccore/releases/download/v0.22.0/civiccore-0.22.0-py3-none-any.whl
      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Test frontend
        run: npm test
        working-directory: frontend
      - name: Run tests
        run: python -m pytest
      - name: Verify docs baseline
        run: bash scripts/verify-docs.sh
      - name: Check CivicCore placeholder imports
        run: python scripts/check-civiccore-placeholder-imports.py
      - name: Verify browser QA evidence
        run: python scripts/verify-browser-qa.py
      - name: Run prompt eval harness
        env:
          CIVICCORE_LLM_PROVIDER: ollama
          CIVICCLERK_EVAL_OFFLINE: "1"
          NO_NETWORK: "1"
        run: python scripts/run-prompt-evals.py
