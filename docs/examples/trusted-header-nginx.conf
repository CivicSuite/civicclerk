# CivicClerk trusted-header reverse proxy reference
#
# Use this only after the identity layer has authenticated the operator and
# mapped the staff principal plus roles into headers that nginx controls.
# The upstream CivicClerk app should trust only the proxy CIDRs configured in
# CIVICCLERK_STAFF_SSO_TRUSTED_PROXIES.

server {
    listen 443 ssl http2;
    server_name clerk.city.example.gov;

    # TLS material is deployment-specific and intentionally omitted here.
    ssl_certificate     /etc/nginx/tls/civicclerk.crt;
    ssl_certificate_key /etc/nginx/tls/civicclerk.key;

    location / {
        proxy_pass http://127.0.0.1:8776;
        proxy_http_version 1.1;

        # Never forward client-supplied identity headers directly.
        proxy_set_header X-Staff-Email "";
        proxy_set_header X-Staff-Roles "";

        # Populate trusted staff identity headers from the authenticated proxy layer.
        proxy_set_header X-Staff-Email $upstream_http_x_authenticated_email;
        proxy_set_header X-Staff-Roles $upstream_http_x_authenticated_roles;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Id $request_id;
    }
}
